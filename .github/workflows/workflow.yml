name: workflow.yml
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

  dockerize-and-push:
    name: Containerization
    runs-on: ubuntu-latest
    steps:
      - name: Checkout(clone the repo)
        uses: actions/checkout@v4

      - name: login to DockerHub
        uses: docker/login-action@v2
        with:
          username: mohamecabdelaziz66
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: build Docker Image
        run: docker build -t mohamecabdelaziz66/metriplate:latest -t mohamecabdelaziz66/metriplate:${{ github.sha }} .

      - name: push Docker Image
        run: docker push mohamecabdelaziz66/metriplate --all-tags

    needs: build

